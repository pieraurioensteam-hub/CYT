<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Quantum Nutricional v2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg: #121415;
            --card: #1e2122;
            --input-bg: #2a2d2e;
            --green: #27ae60;
            --blue: #2980b9;
            --red: #e74c3c;
            --text: #e0e0e0;
            --border: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-top: 0; font-weight: 500; }

        .upload-zone {
            border: 2px dashed #444;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            background: rgba(255,255,255,0.02);
            transition: 0.3s;
            margin-bottom: 20px;
        }

        .upload-zone:hover { border-color: var(--green); background: rgba(39, 174, 96, 0.05); }

        /* Mantiene la apariencia de la imagen cargada */
        #dynamic-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .data-node {
            background: var(--input-bg);
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid var(--blue);
        }

        .data-node label {
            font-size: 0.7rem;
            color: #aaa;
            text-transform: uppercase;
            display: block;
            margin-bottom: 4px;
        }

        .data-node input {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            font-weight: bold;
        }

        .btn-main {
            width: 100%;
            padding: 16px;
            background: var(--green);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 1rem;
            transition: 0.2s;
        }

        .btn-main:active { transform: scale(0.98); background: #219150; }

        #loader { 
            display: none; 
            text-align: center; 
            color: var(--blue); 
            font-weight: bold; 
            margin: 15px 0;
            font-size: 0.9rem;
        }

        .report-box {
            margin-top: 20px;
            padding: 15px;
            background: #16191a;
            border: 1px solid var(--border);
            border-radius: 6px;
            display: none;
        }

        .report-title { color: var(--green); font-weight: bold; margin-bottom: 10px; }
        .tip-box { background: rgba(39, 174, 96, 0.1); color: #2ecc71; padding: 10px; border-radius: 4px; font-size: 0.85rem; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <h2>Bio-Analizador Dinámico</h2>

    <div class="upload-zone" id="dropZone">
        <strong id="labelStatus">Cargando Sistema...</strong>
        <p style="font-size: 0.8rem; color: #888; margin: 5px 0 0;">Detectará automáticamente los nutrientes</p>
        <input type="file" id="fileInput" hidden accept="image/*">
    </div>

    <div id="loader">⚙️ PROCESANDO BIOMOLÉCULAS...</div>

    <div id="dynamic-grid"></div>

    <button class="btn-main" id="processBtn" style="display:none" onclick="generateReport()">Generar Informe de Salud</button>

    <div id="report-area" class="report-box">
        <div class="report-title">Análisis Bio-Químico Listo</div>
        <div id="reportContent" class="tip-box"></div>
    </div>
</div>

<script>
    const nutrientMap = {
        "Calorías": ["calorias", "calories", "kcal", "energía"],
        "Carbohidratos": ["carbohidrato", "carb", "glucido"],
        "Proteína": ["proteina", "protein"],
        "Sodio": ["sodio", "sodium", "sal"],
        "Azúcares": ["azucar", "sugar"],
        "Fibra": ["fibra", "fiber"],
        "Grasas": ["grasa", "fat", "lipidos"],
        "Potasio": ["potasio", "potassium"],
        "Magnesio": ["magnesio", "magnesium"],
        "Hierro": ["hierro", "iron"]
    };

    const recommendations = [
        "Niveles de sodio elevados detectados. Aumenta la ingesta de agua para equilibrar la presión osmótica.",
        "Perfil proteico excelente para síntesis muscular. Mantén la hidratación renal.",
        "Contenido de fibra notable. Esto mejorará significativamente tu tránsito intestinal.",
        "Densidad calórica alta. Considera ajustar las porciones para mantener tu tasa metabólica.",
        "Nivel de azúcares bajo. Estabilidad glucémica detectada en la muestra.",
        "Equilibrio de macronutrientes detectado. Tu metabolismo procesará esto eficientemente."
    ];

    let worker = null;

    // Inicializar el motor OCR de inmediato para ganar tiempo
    async function initOCR() {
        document.getElementById('labelStatus').innerText = "Iniciando Motor...";
        worker = await Tesseract.createWorker('spa+eng');
        await worker.setParameters({
            tessedit_char_whitelist: '0123456789.,abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ ',
        });
        document.getElementById('labelStatus').innerText = "Subir Imagen";
    }
    initOCR();

    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const grid = document.getElementById('dynamic-grid');
    const loader = document.getElementById('loader');

    dropZone.onclick = () => fileInput.click();

    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if(!file) return;

        loader.style.display = 'block';
        grid.innerHTML = "";
        document.getElementById('report-area').style.display = 'none';

        try {
            const { data: { text } } = await worker.recognize(file);
            const rawText = text.toLowerCase().replace(/\s+/g, ' ');
            
            let foundAny = false;
            for (const [label, keys] of Object.entries(nutrientMap)) {
                for (const key of keys) {
                    if (rawText.includes(key)) {
                        const regex = new RegExp(`${key}\\D*(\\d+[,.]?\\d*)`);
                        const match = rawText.match(regex);
                        const val = match ? match[1].replace(',', '.') : "";
                        addInput(label, val);
                        foundAny = true;
                        break;
                    }
                }
            }

            if(foundAny) document.getElementById('processBtn').style.display = 'block';
            else alert("No se detectaron datos claros. Intenta con otra foto.");

        } catch (err) {
            console.error(err);
            alert("Error en el escaneo.");
        } finally {
            loader.style.display = 'none';
        }
    };

    function addInput(label, value) {
        const div = document.createElement('div');
        div.className = 'data-node';
        div.innerHTML = `<label>${label}</label><input type="text" value="${value}">`;
        grid.appendChild(div);
    }

    function generateReport() {
        const reportArea = document.getElementById('report-area');
        const reportContent = document.getElementById('reportContent');
        
        // Seleccionar 2 recomendaciones aleatorias para dar variedad
        const r1 = recommendations[Math.floor(Math.random() * recommendations.length)];
        const r2 = recommendations[Math.floor(Math.random() * recommendations.length)];
        
        reportContent.innerHTML = `${r1}<br><br>${r2}`;
        reportArea.style.display = 'block';
        reportArea.scrollIntoView({behavior: 'smooth'});
    }
</script>

</body>
</html>
